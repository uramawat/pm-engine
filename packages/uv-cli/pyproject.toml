[project]
name = "pm-engine"
version = "1.0.1"
description = "A spec-driven, state-tracked AI coding framework for Gemini CLI"
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
]

[project.scripts]
pm-engine = "pm_engine.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pm_engine"]