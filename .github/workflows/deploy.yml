name: Publish PM Engine

# This workflow triggers automatically whenever you publish a new "Release" on GitHub
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for NPM provenance
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies and Publish
        working-directory: packages/npm-cli
        # npm ci installs exact versions. npm publish will automatically run your prepack build.js script!
        run: |
          npm ci
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Bundle Prompts and Build Wheel
        working-directory: packages/uv-cli
        # Manually trigger your python bundling script, then use uv to build and publish
        run: |
          python build.py
          uv build
          uv publish --token ${{ secrets.PYPI_TOKEN }}